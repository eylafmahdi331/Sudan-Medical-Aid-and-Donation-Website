<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Providers</title>
    <link href="../css/styles.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="min-h-screen bg-background text-foreground">
    <!-- Auth Check Container -->
    <div id="auth-check" class="flex items-center justify-center min-h-screen">
        <div class="text-center">
            <i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto mb-4 text-primary"></i>
            <p>Checking authentication...</p>
        </div>
    </div>

    <!-- Access Denied -->
    <div id="access-denied" class="hidden flex items-center justify-center min-h-screen">
        <div class="text-center bg-card border border-border rounded-xl p-8 shadow-elevated max-w-md">
            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-destructive/20 flex items-center justify-center">
                <i data-lucide="shield-x" class="w-8 h-8 text-destructive"></i>
            </div>
            <h1 class="text-2xl font-bold mb-2">Access Denied</h1>
            <p class="text-muted-foreground mb-6">You must be an admin to access this page.</p>
            <a href="./auth.html"
                class="inline-flex items-center justify-center gap-2 px-6 py-2 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90">
                <i data-lucide="log-in" class="w-4 h-4"></i>
                Login
            </a>
        </div>
    </div>

    <!-- Main Admin Content -->
    <div id="admin-content" class="hidden">
        <!-- Header -->
        <header class="bg-card border-b border-border py-4">
            <div class="container mx-auto px-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="../index.html" class="flex items-center gap-2 text-muted-foreground hover:text-foreground">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i>
                        Back to Site
                    </a>
                    <h1 class="font-serif text-2xl font-bold">Admin Dashboard</h1>
                </div>
                <div class="flex items-center gap-4">
                    <span id="admin-name" class="text-sm text-muted-foreground"></span>
                    <button onclick="logout()" class="text-sm text-red-500 hover:text-red-600">Logout</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="container mx-auto px-4 py-8">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-card border border-border rounded-xl p-6">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 rounded-full bg-yellow-500/20 flex items-center justify-center">
                            <i data-lucide="clock" class="w-5 h-5 text-yellow-600"></i>
                        </div>
                        <div>
                            <p class="text-sm text-muted-foreground">Pending</p>
                            <p id="stat-pending" class="text-2xl font-bold">0</p>
                        </div>
                    </div>
                </div>
                <div class="bg-card border border-border rounded-xl p-6">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 rounded-full bg-green-500/20 flex items-center justify-center">
                            <i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i>
                        </div>
                        <div>
                            <p class="text-sm text-muted-foreground">Approved</p>
                            <p id="stat-approved" class="text-2xl font-bold">0</p>
                        </div>
                    </div>
                </div>
                <div class="bg-card border border-border rounded-xl p-6">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center">
                            <i data-lucide="x-circle" class="w-5 h-5 text-red-600"></i>
                        </div>
                        <div>
                            <p class="text-sm text-muted-foreground">Rejected</p>
                            <p id="stat-rejected" class="text-2xl font-bold">0</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pending Providers Section -->
            <section class="bg-card border border-border rounded-xl overflow-hidden">
                <div class="p-6 border-b border-border">
                    <h2 class="font-serif text-xl font-semibold flex items-center gap-2">
                        <i data-lucide="building" class="w-5 h-5 text-primary"></i>
                        Pending Provider Applications
                    </h2>
                </div>
                <div id="pending-list" class="divide-y divide-border">
                    <div class="p-6 text-center text-muted-foreground">
                        <i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2"></i>
                        Loading pending providers...
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            await checkAuth();
        });

        async function checkAuth() {
            try {
                const response = await fetch('check_auth.php');
                const data = await response.json();

                if (data.authenticated && data.user.role === 'admin') {
                    currentUser = data.user;
                    showAdminContent();
                } else {
                    showAccessDenied();
                }
            } catch (e) {
                console.error('Auth check failed:', e);
                showAccessDenied();
            }
        }

        function showAdminContent() {
            document.getElementById('auth-check').classList.add('hidden');
            document.getElementById('access-denied').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
            document.getElementById('admin-name').textContent = `Welcome, ${currentUser.name}`;
            lucide.createIcons();
            fetchPendingProviders();
            fetchStats();
        }

        function showAccessDenied() {
            document.getElementById('auth-check').classList.add('hidden');
            document.getElementById('access-denied').classList.remove('hidden');
            document.getElementById('admin-content').classList.add('hidden');
            lucide.createIcons();
        }

        async function fetchStats() {
            try {
                const response = await fetch('admin_stats.php');
                const data = await response.json();
                if (data.stats) {
                    document.getElementById('stat-pending').textContent = data.stats.pending || 0;
                    document.getElementById('stat-approved').textContent = data.stats.approved || 0;
                    document.getElementById('stat-rejected').textContent = data.stats.rejected || 0;
                }
            } catch (e) {
                console.error('Stats fetch failed:', e);
            }
        }

        async function fetchPendingProviders() {
            const list = document.getElementById('pending-list');

            try {
                const response = await fetch('get_pending_providers.php');
                const data = await response.json();

                console.log('Pending providers response:', data);

                if (!data.providers || data.providers.length === 0) {
                    list.innerHTML = `
                        <div class="p-8 text-center">
                            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-muted flex items-center justify-center">
                                <i data-lucide="inbox" class="w-8 h-8 text-muted-foreground"></i>
                            </div>
                            <p class="text-muted-foreground">No pending applications</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                list.innerHTML = data.providers.map(p => `
                    <div class="p-6 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4" id="provider-${p.PROVIDER_ID}">
                        <div class="flex-1">
                            <div class="flex items-center gap-3 mb-2">
                                <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
                                    <i data-lucide="${p.TYPE === 'hospital' ? 'building' : 'pill'}" class="w-6 h-6 text-primary"></i>
                                </div>
                                <div>
                                    <h3 class="font-semibold text-lg">${p.NAME}</h3>
                                    <p class="text-sm text-muted-foreground capitalize">${p.TYPE} • ${p.CITY || 'No City Specified'}</p>
                                </div>
                            </div>
                            <div class="ml-15 grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm mt-3">
                                <p><span class="text-muted-foreground">Doctor:</span> ${p.DOCTOR_NAME || 'N/A'}</p>
                                <p><span class="text-muted-foreground">Specialty:</span> ${p.SPECIALTY || 'N/A'}</p>
                                <p><span class="text-muted-foreground">Email:</span> ${p.EMAIL}</p>
                                <p><span class="text-muted-foreground">Applied:</span> ${new Date(p.CREATED_AT).toLocaleDateString()}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="verifyProvider(${p.PROVIDER_ID}, 'approve')" 
                                class="inline-flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                                <i data-lucide="check" class="w-4 h-4"></i>
                                Approve
                            </button>
                            <button onclick="verifyProvider(${p.PROVIDER_ID}, 'reject')" 
                                class="inline-flex items-center gap-2 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                                <i data-lucide="x" class="w-4 h-4"></i>
                                Reject
                            </button>
                        </div>
                    </div>
                `).join('');

                lucide.createIcons();

            } catch (error) {
                console.error('Error fetching providers:', error);
                list.innerHTML = `
                    <div class="p-6 text-center text-red-500">
                        <i data-lucide="alert-circle" class="w-6 h-6 mx-auto mb-2"></i>
                        Error loading data. Check console for details.
                    </div>
                `;
                lucide.createIcons();
            }
        }

        async function verifyProvider(id, action) {
            if (!confirm(`Are you sure you want to ${action} this provider?`)) return;

            const btn = event.target.closest('button');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Processing...';
            lucide.createIcons();

            try {
                const formData = new FormData();
                formData.append('id', id);
                formData.append('action', action);

                console.log('Sending verify request for provider:', id, action);

                const response = await fetch('verify_provider.php', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                console.log('Verify response:', data);

                if (response.ok) {
                    // Remove the provider card with animation
                    const card = document.getElementById(`provider-${id}`);
                    if (card) {
                        card.style.transition = 'all 0.3s ease';
                        card.style.opacity = '0';
                        card.style.transform = 'translateX(-20px)';
                        setTimeout(() => {
                            fetchPendingProviders();
                            fetchStats();
                        }, 300);
                    }

                    // Show success toast
                    showToast(data.message || `Provider ${action}d successfully`, 'success');
                } else {
                    showToast(data.error || 'Operation failed', 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                    lucide.createIcons();
                }
            } catch (error) {
                console.error('Verify error:', error);
                showToast('Network error. Check console.', 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 flex items-center gap-2 ${type === 'success' ? 'bg-green-600 text-white' :
                    type === 'error' ? 'bg-red-600 text-white' :
                        'bg-gray-800 text-white'
                }`;
            toast.innerHTML = `
                <i data-lucide="${type === 'success' ? 'check-circle' : type === 'error' ? 'x-circle' : 'info'}" class="w-5 h-5"></i>
                ${message}
            `;
            document.body.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.transition = 'all 0.3s ease';
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function logout() {
            window.location.href = 'logout.php';
        }
    </script>
</body>

</html>
